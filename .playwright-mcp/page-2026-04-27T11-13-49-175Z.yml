                    - paragraph [ref=e122]: Race Conditions
                    - paragraph [ref=e123]: A **race condition** occurs when two or more threads/processes attempt to modify shared resources concurrently, with the final outcome depending on the sequence or timing of their execution. This leads to unpredictable results and behavior in a program.
                    - paragraph [ref=e124]: It highlights the risks associated with concurrent execution, which is a key consideration in system design.
