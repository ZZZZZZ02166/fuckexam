                - generic [ref=e380]:
                  - paragraph [ref=e381]: ✓ Full-mark answer
                  - generic [ref=e382]: Busy waiting involves a process repeatedly checking for conditions (e.g., a lock) and can waste CPU resources, making it inefficient for long waits. In contrast, blocking allows a process to yield control when it's unable to enter a critical region, avoiding unnecessary CPU usage. Busy waiting may be preferable in high-priority real-time systems where response time is crucial, while blocking is generally better for systems where CPU efficiency is vital to avoid starvation and reduce context switching overhead. Both methods require careful trade-offs to optimize performance based on specific use cases.
