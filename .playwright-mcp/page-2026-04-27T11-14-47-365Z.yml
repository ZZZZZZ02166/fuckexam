                - generic [ref=e328]:
                  - paragraph [ref=e329]: ✓ Full-mark answer
                  - generic [ref=e330]: Race conditions occur when multiple threads access shared resources concurrently and the outcome depends on the timing of their execution. For example, consider a stack represented by a global variable 'aStack'. If two threads check if the stack is empty simultaneously, one thread may find it non-empty and pop an element. If the second thread simultaneously checks the same condition, it may incorrectly also execute a pop operation leading to an error. This illustrates the critical region that needs mutual exclusion to avoid errors. Proper synchronization, such as using locks, is vital to prevent race conditions.
                - generic [ref=e331]:
                  - paragraph [ref=e332]: ✗ Weak answer
                  - generic [ref=e333]: Race conditions happen when threads access shared resources. For instance, two threads popping from a stack at the same time can cause errors.
